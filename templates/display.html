<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>観客表示 - 鉄輪式戦車レース</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="display-body">
  <div class="stage-bg"></div>
  <main class="display">
    <header class="display-header">
      <div>
        <div class="label">GRAND CIRCUIT ARCA</div>
        <h1 id="raceTitle">鉄輪式戦車レース</h1>
      </div>
      <div class="round-box">
        <div id="roundName">待機中</div>
        <div id="seedBox"></div>
      </div>
    </header>

    <section class="race-layout">
      <div class="track">
        <div class="lane" data-area="後列">
          <div class="lane-title">後列</div>
          <div class="lane-cards" id="lane-back"></div>
        </div>
        <div class="lane" data-area="中列">
          <div class="lane-title">中列</div>
          <div class="lane-cards" id="lane-mid"></div>
        </div>
        <div class="lane front" data-area="前列">
          <div class="lane-title">前列</div>
          <div class="lane-cards" id="lane-front"></div>
        </div>
        <div class="goal-line">GOAL</div>
      </div>

      <aside class="ranking-panel">
        <h2>現在順位</h2>
        <ol id="ranking"></ol>
      </aside>
    </section>

    <section class="bottom-layout" id="bottomLayout">
      <section class="dice-panel" id="dicePanel" hidden>
        <div class="dice-label" id="diceLabel">判定</div>
        <div class="dice-numbers">
          <span id="diceDie1">-</span>
          <span class="dice-operator">+</span>
          <span id="diceDie2">-</span>
          <span class="dice-operator">=</span>
          <strong id="diceSum">-</strong>
        </div>
        <div class="dice-formula" id="diceFormula"></div>
        <div class="dice-meta">
          <span>補正 <strong id="diceBonus">+0</strong></span>
          <span>達成 <strong id="diceTotal">-</strong></span>
          <span id="diceTargetWrap"><span id="diceTargetLabel">目標</span> <strong id="diceTarget">-</strong></span>
        </div>
        <div class="dice-result" id="diceResult">待機中</div>
      </section>

      <section class="cinema-log" id="cinemaLog">
        <h2 id="eventTitle">待機中</h2>
        <p id="eventText">GM管理画面でレースを生成してください。</p>
      </section>
    </section>
  </main>
  <script src="/static/display.js"></script>
</body>
</html>
