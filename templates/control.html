<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>GM管理画面 - 鉄輪式戦車レース</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="page control-page">
  <header class="topbar">
    <h1>GM管理画面</h1>
    <a href="/display" target="_blank">観客表示画面を開く</a>
  </header>

  <section class="panel settings">
    <h2>レース設定</h2>
    <div class="form-grid">
      <label>ランク
        <select id="rank">
          <option>D</option><option>C</option><option>B</option><option selected>A</option><option>S</option>
        </select>
      </label>
      <label>番組
        <select id="program">
          <option value="standard" selected>標準公式戦</option>
          <option value="speed">高速戦</option>
          <option value="technique">技巧戦</option>
          <option value="heavy">重装戦</option>
          <option value="shooting">射撃戦</option>
          <option value="chaos">荒れ場戦</option>
        </select>
      </label>
      <label>seed（空欄ならランダム）
        <input id="seed" type="number" placeholder="例：42">
      </label>
      <label>自動再生間隔(ms)
        <input id="autoInterval" type="number" min="500" step="100" value="2500">
      </label>
    </div>
    <div class="actions">
      <button id="newRace">新規レース生成</button>
      <button id="prevEvent" class="secondary">前へ</button>
      <button id="nextEvent">次の観客イベントへ</button>
      <button id="resetView" class="secondary">先頭へ戻す</button>
      <button id="autoStart">自動再生開始</button>
      <button id="autoStop" class="secondary" disabled>停止</button>
    </div>
    <div id="oddsStartWarning" class="start-warning" hidden>
      <div>
        <strong>オッズ未計算です。</strong>
        <span>このレースのオッズを出さずに演出を進めますか？</span>
      </div>
      <button id="startWithoutOdds" type="button">このまま演出開始</button>
      <button id="dismissOddsWarning" type="button" class="secondary">戻る</button>
    </div>
    <div id="autoStatus" class="auto-status">自動再生: 停止中</div>
  </section>

  <section class="panel">
    <h2>現在イベント</h2>
    <div id="currentEvent" class="current-event">まだレースが生成されていません。</div>
  </section>

  <section class="panel">
    <h2>オッズ・払戻</h2>
    <div class="odds-controls">
      <label>事前シミュレーション回数
        <input id="oddsSimulations" type="number" min="100" max="10000" step="100" value="1000">
      </label>
      <button id="calculateOdds">オッズ計算</button>
      <div id="oddsStatus" class="auto-status">未計算</div>
    </div>
    <div id="oddsSummary" class="odds-summary"></div>
    <div id="oddsTable" class="odds-table"></div>

    <div class="bet-panel">
      <label>賭け種別
        <select id="betType">
          <option value="win">単勝</option>
          <option value="place">複勝</option>
          <option value="exacta">連単</option>
          <option value="quinella">連複</option>
          <option value="trifecta">三連単</option>
          <option value="perfect">パーフェクト</option>
        </select>
      </label>
      <div id="betTargetLabel" class="bet-target-group">
        <span>対象戦車</span>
        <div id="betTargets" class="bet-targets"></div>
      </div>
      <label>掛け金
        <input id="betStake" type="number" min="0" step="1" value="100">
      </label>
      <button id="evaluateBet">払戻計算</button>
    </div>
    <div id="betOddsPreview" class="bet-odds-preview">オッズ計算後に選択中のオッズを表示します。</div>
    <div id="betResult" class="bet-result">レース終了後に払戻計算できます。</div>
  </section>

  <section class="panel">
    <h2>レース前告知文</h2>
    <div class="announcement-controls">
      <button id="generateAnnouncement">告知文生成</button>
      <button id="copyAnnouncement" class="secondary" type="button">コピー</button>
      <div id="announcementStatus" class="auto-status">レース生成後にMarkdown告知文を生成できます。</div>
    </div>
    <textarea id="announcementText" class="announcement-text" readonly placeholder="ここにDiscord貼り付け用のMarkdown告知文が表示されます。"></textarea>
  </section>

  <section class="panel split">
    <div>
      <h2>出走表</h2>
      <div id="tankList"></div>
    </div>
    <div>
      <h2>イベント一覧</h2>
      <div id="eventList" class="event-list"></div>
    </div>
  </section>

  <script src="/static/control.js"></script>
</body>
</html>
